<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiki Data — Professional Football Analytics</title>
  <meta name="description" content="Professional football analytics dashboard with live match data, standings, lineups and events from real datasets." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/img/logo.png" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- WELCOME SCREEN -->
  <div id="view-welcome">
    <div class="welcome-content">
      <img src="/img/logo.png" alt="Tiki Data" class="welcome-logo" />
      <h1 class="welcome-title">TIKI DATA</h1>
      <div class="welcome-quote-box">
        <p class="welcome-quote">"Quality without results is pointless. Results without quality is boring." — Johan Cruyff</p>
      </div>
      <button class="enter-btn" onclick="enterDashboard()">Enter Experience</button>
    </div>
  </div>
  <!-- Top Navigation -->
  <header class="navbar">
    <div class="navbar-inner">
      <div class="navbar-brand">
        <img src="/img/logo.png" alt="Tiki Data" class="brand-logo" />
        <span class="brand-name">Tiki Data</span>
      </div>
      <nav class="navbar-tabs">
        <button class="nav-tab active" id="tab-matches" onclick="switchTab('matches')">Matches</button>
        <button class="nav-tab" id="tab-standings" onclick="switchTab('standings')">Standings</button>
        <button class="nav-tab" id="tab-market" onclick="switchTab('market')">Market</button>
      </nav>
      <div class="navbar-right">
        <div class="status-pill" id="sync-status">
          <span class="status-dot"></span>
          <span id="sync-text">Indexing Data...</span>
        </div>
        <div class="user-profile">
          <div class="user-avatar">AD</div>
        </div>
      </div>
    </div>
  </header>

  <div class="app-layout">
    <!-- Left Sidebar: Competitions -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>Competitions</span>
        <div class="sidebar-search">
          <input type="text" id="comp-search" placeholder="Search..." oninput="filterCompetitions()" />
        </div>
      </div>
      <div class="competition-list" id="competition-list">
        <div class="skeleton-loader">
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">

      <!-- Season + Filter Bar -->
      <div class="filter-bar" id="filter-bar">
        <div class="filter-left">
          <span class="filter-label" id="comp-title">All Competitions</span>
        </div>
        <div class="filter-right">
          <select id="season-select" onchange="loadMatches()" class="season-select">
            <option value="">All Seasons</option>
          </select>
        </div>
      </div>

      <!-- MATCHES VIEW -->
      <div id="view-matches">
        <div class="match-list" id="match-list">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Loading data from 500,000+ records...</p>
          </div>
        </div>
      </div>

      <!-- STANDINGS VIEW -->
      <div id="view-standings" class="hidden">
        <div class="standings-container" id="standings-container">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Building league table...</p>
          </div>
        </div>
      </div>

      <!-- MARKET VIEW -->
      <div id="view-market" class="hidden">
        <div class="analytics-container" id="market-container">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Analyzing market values...</p>
          </div>
        </div>
      </div>

    </main>

    <!-- Right Panel: Match Detail -->
    <aside class="detail-panel hidden" id="detail-panel">
      <div class="detail-header">
        <button class="close-btn" onclick="closeDetail()">✕</button>
        <span class="detail-comp" id="detail-comp"></span>
      </div>
      <div class="detail-body" id="detail-body">
        <!-- injected dynamically -->
      </div>
    </aside>
  </div>

  <!-- Toast notifications -->
  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
</body>
</html>
